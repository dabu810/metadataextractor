services:

  # ── Agent API ─────────────────────────────────────────────────────────────────
  agent-api:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: metadata-agent-api:latest
    container_name: metadata-agent-api
    restart: unless-stopped
    ports:
      - "${AGENT_PORT:-8000}:8000"
    volumes:
      - reports_data:/data/reports
    environment:
      # Anthropic key — set in .env or shell before running
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      DATA_DIR: /data/reports
      # Tune log verbosity: debug | info | warning
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - metadata-net

  # ── Ontology API ───────────────────────────────────────────────────────────────
  ontology-api:
    build:
      context: .
      dockerfile: Dockerfile.ontology
    image: metadata-ontology-api:latest
    container_name: metadata-ontology-api
    restart: unless-stopped
    ports:
      - "${ONTOLOGY_PORT:-8001}:8001"
    volumes:
      - reports_data:/data/reports
    environment:
      DATA_DIR: /data/reports
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - metadata-net

  # ── Knowledge Graph API ────────────────────────────────────────────────────────
  kg-api:
    build:
      context: .
      dockerfile: Dockerfile.kg
    image: metadata-kg-api:latest
    container_name: metadata-kg-api
    restart: unless-stopped
    ports:
      - "${KG_PORT:-8002}:8002"
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - metadata-net

  # ── Streamlit UI ──────────────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    image: metadata-agent-ui:latest
    container_name: metadata-agent-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-8501}:8501"
    environment:
      # Must match service names above so Docker DNS resolves them
      AGENT_API_URL:    "http://agent-api:8000"
      ONTOLOGY_API_URL: "http://ontology-api:8001"
      KG_API_URL:       "http://kg-api:8002"
    depends_on:
      agent-api:
        condition: service_healthy
      ontology-api:
        condition: service_started
      kg-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - metadata-net

# ── Named volume so reports persist across container restarts ─────────────────
volumes:
  reports_data:
    driver: local

# ── Internal network — UI reaches API via service name, not localhost ─────────
networks:
  metadata-net:
    driver: bridge
